<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grade Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
      color: #1e3c72;
    }

    p {
      margin-bottom: 20px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #1e3c72;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16325c;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f4f4f4;
      text-align: left;
      font-family: monospace;
      white-space: pre-wrap;
    }

    .error {
      color: red;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Grade Calculator</h1>
  <p>Enter grades separated by commas</p>

  <input type="text" id="grades" placeholder="85, 90, 78">

  <button onclick="submitGrades()">Calculate</button>

  <div id="result" class="result"></div>
  <div id="error" class="error"></div>
</div>

<script>
  async function submitGrades() {
    const input = document.getElementById("grades").value;
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.textContent = "";
    errorDiv.textContent = "";

    try {
      const grades = input.split(",").map(x => Number(x.trim()));

      const response = await fetch("/calculate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ grades })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error);
      }

      resultDiv.textContent =
        "Average: " + data.average.toFixed(2) + "\n" +
        "Letter Grade: " + data.letterGrade + "\n" +
        "Pass Status: " + data.passStatus;

    } catch (err) {
      errorDiv.textContent = err.message;
    }
  }
</script>

</body>
</html>
