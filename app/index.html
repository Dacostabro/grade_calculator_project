<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grade Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #02060f, #1e3c72, #f4f7fb);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      overflow: hidden;
    }

    #cursorCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
    }

    /* ================= LOADER ================= */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #000000, #1e3c72);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      font-size: 18px;
      transition: opacity 0.6s ease, visibility 0.6s;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    /* ================= APP ================= */
    .container {
      background: rgba(255, 255, 255, 0.96);
      padding: 45px;
      border-radius: 18px;
      width: 470px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-bottom: 12px;
      color: #1e3c72;
      font-size: 38px;
    }

    p {
      margin-bottom: 28px;
      color: #555;
      font-size: 18px;
    }

    input,
    button,
    .result {
      width: 100%;
    }

    input {
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #1e3c72;
      box-shadow: 0 0 8px rgba(30, 60, 114, 0.35);
    }

    button {
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3c72, #000000);
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    button:hover {
      background: linear-gradient(135deg, #2a5298, #000000);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .result {
      display: none;
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f7faff, #ffffff);
      text-align: center;
      border-left: 6px solid #1e3c72;
      box-shadow: inset 0 0 0 1px #e4e8f0;
      font-size: 17px;
      line-height: 1.7;
    }

    .error {
      color: #d00000;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<canvas id="cursorCanvas"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="spinner"></div>
  <p>Loading Grade Calculator...</p>
</div>

<!-- APP -->
<div class="container">
  <h1>Grade Calculator</h1>
  <p>Enter grades separated by commas</p>

  <input type="text" id="grades" placeholder="85, 90, 78">

  <button onclick="submitGrades()">Calculate</button>

  <div id="result" class="result"></div>
  <div id="error" class="error"></div>
</div>

<script>
  // LOADER FADE OUT
  window.addEventListener("load", () => {
    const loader = document.getElementById("loader");
    setTimeout(() => {
      loader.classList.add("hidden");
    }, 800);
  });

  async function submitGrades() {
    const input = document.getElementById("grades").value;
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.innerHTML = "";
    resultDiv.style.display = "none";
    errorDiv.textContent = "";

    try {
      const grades = input.split(",").map(x => Number(x.trim()));

      const response = await fetch("/calculate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ grades })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error);
      }

      resultDiv.style.display = "block";
      resultDiv.innerHTML =
        "<strong>Average:</strong> " + data.average.toFixed(2) + "<br>" +
        "<strong>Letter Grade:</strong> " + data.letterGrade + "<br>" +
        "<strong>Pass Status:</strong> " + data.passStatus;

    } catch (err) {
      errorDiv.textContent = err.message;
    }
  }

  // BLUE MOUSE TRAIL EFFECT
  const canvas = document.getElementById("cursorCanvas");
  const ctx = canvas.getContext("2d");

  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      this.size = Math.random() * 6 + 2;
      this.speedX = (Math.random() - 0.5) * 2;
      this.speedY = (Math.random() - 0.5) * 2;
      this.alpha = 1;
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;
      this.alpha -= 0.025;
      this.size *= 0.98;
    }

    draw() {
      ctx.shadowBlur = 18;
      ctx.shadowColor = "#0096ff";
      ctx.fillStyle = `rgba(0, 150, 255, ${this.alpha})`;

      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
    }
  }

  window.addEventListener("mousemove", (e) => {
    for (let i = 0; i < 5; i++) {
      particles.push(new Particle(e.clientX, e.clientY));
    }
  });

  function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((particle, index) => {
      particle.update();
      particle.draw();

      if (particle.alpha <= 0 || particle.size <= 0.5) {
        particles.splice(index, 1);
      }
    });

    requestAnimationFrame(animateParticles);
  }

  animateParticles();
</script>

</body>
</html>
