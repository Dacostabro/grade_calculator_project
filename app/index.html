<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grade Calculator</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #02060f, #1e3c72, #f4f7fb);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.96);
      padding: 45px;
      border-radius: 18px;
      width: 470px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-bottom: 12px;
      color: #1e3c72;
      font-size: 38px;
    }

    p {
      margin-bottom: 28px;
      color: #555;
      font-size: 18px;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 18px;
      outline: none;
    }

    input:focus {
      border-color: #1e3c72;
      box-shadow: 0 0 8px rgba(30, 60, 114, 0.35);
    }

    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3c72, #000000);
      color: white;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s;
    }

    button:hover {
      background: linear-gradient(135deg, #2a5298, #000000);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    }

    .result {
      display: none;
      margin-top: 25px;
      padding: 18px;
      border-radius: 12px;
      background: linear-gradient(135deg, #f7faff, #ffffff);
      text-align: center;
      font-family: Arial, sans-serif;
      border-left: 6px solid #1e3c72;
      box-shadow: inset 0 0 0 1px #e4e8f0;
      font-size: 17px;
      line-height: 1.7;
    }

    .error {
      color: #d00000;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Grade Calculator</h1>
  <p>Enter grades separated by commas</p>

  <input type="text" id="grades" placeholder="85, 90, 78">

  <button onclick="submitGrades()">Calculate</button>

  <div id="result" class="result"></div>
  <div id="error" class="error"></div>
</div>

<script>
  async function submitGrades() {
    const input = document.getElementById("grades").value;
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.innerHTML = "";
    resultDiv.style.display = "none";
    errorDiv.textContent = "";

    try {
      const grades = input.split(",").map(x => Number(x.trim()));

      const response = await fetch("/calculate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ grades })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error);
      }

      resultDiv.style.display = "block";
      resultDiv.innerHTML =
        "<strong>Average:</strong> " + data.average.toFixed(2) + "<br>" +
        "<strong>Letter Grade:</strong> " + data.letterGrade + "<br>" +
        "<strong>Pass Status:</strong> " + data.passStatus;

    } catch (err) {
      errorDiv.textContent = err.message;
    }
  }
</script>

</body>
</html>
