<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grade Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1e3c72, #ffffff);
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 18px;
      width: 400px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
      color: #1e3c72;
    }

    p {
      margin-bottom: 25px;
      color: #555;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #1e3c72;
      box-shadow: 0 0 8px rgba(30,60,114,0.4);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #1e3c72, #000000);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.25s;
      font-weight: bold;
    }

    button:hover {
      background: linear-gradient(135deg, #2a5298, #000000);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .result {
      margin-top: 25px;
      padding: 15px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f0f4ff, #ffffff);
      text-align: left;
      font-family: monospace;
      white-space: pre-wrap;
      border-left: 5px solid #1e3c72;
    }

    .error {
      color: #ff4d4d;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Grade Calculator</h1>
  <p>Enter grades separated by commas</p>

  <div class="input-group">
    <input type="text" id="grades" placeholder="85, 90, 78">
    <button onclick="submitGrades()">Calculate</button>
  </div>

  <div id="result" class="result"></div>
  <div id="error" class="error"></div>
</div>

<script>
  async function submitGrades() {
    const input = document.getElementById("grades").value;
    const resultDiv = document.getElementById("result");
    const errorDiv = document.getElementById("error");

    resultDiv.textContent = "";
    errorDiv.textContent = "";

    try {
      const grades = input.split(",").map(x => Number(x.trim()));

      const response = await fetch("/calculate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ grades })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error);
      }

      resultDiv.textContent =
        "Average: " + data.average.toFixed(2) + "\n" +
        "Letter Grade: " + data.letterGrade + "\n" +
        "Pass Status: " + data.passStatus;

    } catch (err) {
      errorDiv.textContent = err.message;
    }
  }
</script>

</body>
</html>
